                setIsAiLoading(true);

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${API_KEY}`;
                    
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [{
                                    text: `Sen kesinlikle edebi bir yazar değilsin. Sen nesnel bir Bilim Tarihi Veri Analistisin.

FORMAT: Yanıtı her zaman şu JSON formatında döndür: {"text": "teknik_aciklama", "imageUrl": "gorsel_url"}`
                                }]
                            }],
                            generationConfig: {
                                responseMimeType: "application/json"
                            }
                        })
                    });

                    const data = await response.json();
                    
                    if (data.error) {
                        console.error("Detaylı Hata:", data.error);
                        setAiResponse(`API Hatası (${data.error.code}): ${data.error.message}`);

                            const result = JSON.parse(data.candidates[0].content.parts[0].text);
                            setAiResponse(result.text);
                            if (result.imageUrl && result.imageUrl.startsWith('http')) {
                                setAiImageUrl(result.imageUrl);

                            // JSON parse hatası olursa düz metin olarak almayı dene
